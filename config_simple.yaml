# DR Agent config: lightweight background research (fast, no coordinator, no polish)

model:
  default_model: "gpt-5-mini"          # workers/skimmers stay cheap
  global_planner_model: "gpt-5.5"      # sets the research structure — 1-2 calls/round
  global_execution_model: null
  coordinator_model: "gpt-5.5"         # no-op in simple mode (coordinator disabled); active if mode switched to complex
  synthesizer_model: "gpt-5.5"         # writes the briefing the committee reads — 1 call/round
  task_agent_model: null

main:
  max_iter: 5
  enable_coordinator: false

global_planner:
  max_iter: 2
  max_nodes: 5
  enable_multi_layer: true
  max_retries: 2
  tools:
    enabled_tools:
      - "arxiv_search"
      - "openalex_search"
      - "crossref_search"
      - "tavily_search"
      - "url_processor"

global_execution:
  max_workers: 10
  planner:
    max_subtasks: 2
    tools:
      enabled_tools:
        - "arxiv_search"
        - "openalex_search"
        - "crossref_search"
        - "tavily_search"
        - "url_processor"
  execution:
    max_tool_calls: 5
    tools:
      enabled_tools:
        - "arxiv_search"
        - "openalex_search"
        - "crossref_search"
        - "tavily_search"
        - "url_processor"

coordinator:
  max_correction_attempts: 3
  tools:
    enabled_tools:
      - "arxiv_search"
      - "openalex_search"
      - "crossref_search"
      - "tavily_search"
      - "url_processor"

synthesizer:
  output_format: "markdown"
  include_details: true
  include_failed_nodes: true
  max_output_length: 1000000
  polish: false

tools:
  enabled_tools:
    - "arxiv_search"
    - "openalex_search"
    - "crossref_search"
    - "tavily_search"
    - "url_processor"

log:
  log_level: "INFO"
  log_dir: "./logs"
  console_output: true
  log_filename_format: "{timestamp}_{agent_type}.log"
  save_execution_trace: true
  trace_output_dir: "./logs/traces"

path:
  project_root: "."
  dataset_dir: "./gaia_dataset"
  results_dir: "./gaia_results"
  tmp_dir: "./tmp"
  cache_dir: "./tmp/cache"
